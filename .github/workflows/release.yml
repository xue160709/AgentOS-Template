name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      # macOS: only pass Apple / mac signing env (do not pass WIN_CSC_*).
      - name: Build and publish (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: npm run release

      # Windows: secrets cannot be used in step `if` — branch inside the script instead.
      - name: Build and publish (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK)) {
            Write-Host "WIN_CSC_LINK not set — building unsigned Windows package."
            Remove-Item Env:WIN_CSC_LINK -ErrorAction SilentlyContinue
            Remove-Item Env:WIN_CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
            $env:CSC_IDENTITY_AUTO_DISCOVERY = 'false'
          } elseif ($env:WIN_CSC_LINK -match '^[A-Za-z]:\\') {
            Write-Error "WIN_CSC_LINK must be Base64 of the .pfx file, not a path like $($env:WIN_CSC_LINK). Delete the secret to build unsigned, or re-encode the certificate."
          } else {
            Write-Host "WIN_CSC_LINK set — building signed Windows package."
          }
          npm run release
